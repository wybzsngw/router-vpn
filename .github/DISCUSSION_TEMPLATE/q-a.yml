title: "[故障求助] "
body:
  - type: markdown
    attributes:
      value: |
        感谢你的反馈。为了更快定位问题，请尽量完整填写下面的信息。

        请勿提交以下敏感内容：
        - 订阅链接（含 token）
        - 邀请码注册链接（?code= / ?ref=）
        - 邮箱、手机号、订单号、支付截图

  - type: dropdown
    id: fault_type
    attributes:
      label: 故障类型
      options:
        - 订阅下载失败 / 导入后节点为空
        - MerlinClash 启动失败 / 配置报错
        - OpenClash 订阅或启动异常
        - UniClash 登录或连接异常
        - AI / 流媒体地区限制
        - 客户端导入失败（Windows/macOS/Android/iOS）
        - 其他
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: 设备与系统
      placeholder: 例如 AX86U + Merlin 388.8 / Windows 11 24H2
    validations:
      required: true

  - type: input
    id: client_version
    attributes:
      label: 客户端/插件版本
      placeholder: 例如 MerlinClash 2.x / OpenClash v0.47.x
    validations:
      required: true

  - type: textarea
    id: symptom
    attributes:
      label: 现象与报错
      placeholder: |
        现象：
        报错：
        复现步骤：
    validations:
      required: true

  - type: textarea
    id: tried_steps
    attributes:
      label: 已尝试操作
      placeholder: |
        - 已尝试步骤 1：
        - 已尝试步骤 2：
        - 结果：
    validations:
      required: true
