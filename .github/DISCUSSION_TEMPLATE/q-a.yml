title: "[求助] "
body:
  - type: markdown
    attributes:
      value: |
        简单描述即可，越具体越快定位。

        ⚠️ 请勿公开：订阅链接（含 token）、邀请码链接（?code= / ?ref=）、邮箱 / 手机号 / 订单号 / 支付截图。

  - type: dropdown
    id: scene
    attributes:
      label: 大概属于哪类问题？（可选）
      options:
        - 订阅下载失败 / 导入后节点为空
        - 客户端启动或配置报错
        - 能连上但网页 / 应用打不开
        - AI / 流媒体地区限制
        - 选型 / 套餐 / 其他
    validations:
      required: false

  - type: textarea
    id: detail
    attributes:
      label: 问题描述
      description: 一段话写清即可；方便的话带上设备、客户端版本、报错原文。
      placeholder: |
        设备 / 客户端：例如 AX86U + MerlinClash / Windows + Clash Verge
        现象 / 报错：
        已经试过：
    validations:
      required: true
