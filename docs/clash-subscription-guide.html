<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>页面已迁移 - Clash订阅申请指南</title>
  <link rel="canonical" href="https://mowei-ie.github.io/router-vpn/pages/clash-subscription-guide.html" />
  <meta http-equiv="refresh" content="5;url=../pages/clash-subscription-guide.html" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,-apple-system,"Microsoft YaHei",sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;background:linear-gradient(135deg,#f0f4ff 0%,#e8eeff 50%,#f7f8fc 100%)}
    .box{text-align:center;padding:48px 40px;border-radius:20px;background:#fff;box-shadow:0 8px 30px rgba(0,0,0,.08);max-width:480px;width:90%}
    h2{font-size:22px;margin-bottom:16px;color:#1e293b}
    .icon{font-size:48px;margin-bottom:16px}
    p{color:#64748b;line-height:1.8;margin-bottom:8px}
    .countdown{font-size:40px;color:#7c4dff;font-weight:bold;display:block;margin:16px 0}
    a{color:#0ea5e9;text-decoration:none;font-weight:500}
    a:hover{text-decoration:underline}
    .hint{color:#94a3b8;font-size:13px;margin-top:20px;padding-top:16px;border-top:1px solid #f1f5f9}
  </style>
</head>
<body>
  <div class="box">
    <div class="icon">📦</div>
    <h2>页面已迁移到新地址</h2>
    <p><span class="countdown" id="cd">5</span></p>
    <p>秒后自动跳转到新页面</p>
    <p style="margin-top:12px">如未自动跳转，请点击：<br><a href="../pages/clash-subscription-guide.html">前往新页面 →</a></p>
    <p class="hint">请更新您的收藏夹为新地址</p>
  </div>
  <script>
    let s=5;const el=document.getElementById('cd');
    const t=setInterval(()=>{s--;el.textContent=s;if(s<=0){clearInterval(t);location.href='../pages/clash-subscription-guide.html';}},1000);
  </script>
</body>
</html>
