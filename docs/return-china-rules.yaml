# =============================================================================
# 回国分流规则集 return-china-rules.yaml
# -----------------------------------------------------------------------------
# 用途：让身在海外、已经用 Clash / Mihomo 翻墙出国的用户，在同一份配置里
#       额外把"国内服务"的流量定向到回国节点，其它流量保持原有出国规则不变。
#
# 类型：Clash / Mihomo rule-provider（behavior: classical）
# 维护：https://github.com/mowei-ie/router-vpn  ·  docs/return-china-rules.yaml
# 配套说明：return-china/client/clash-reverse-rules.md
#
# 一键引用（在你的主配置里加入）：
#   rule-providers:
#     return-china:
#       type: http
#       behavior: classical
#       format: yaml
#       url: "https://raw.githubusercontent.com/mowei-ie/router-vpn/main/docs/return-china-rules.yaml"
#       path: ./ruleset/return-china.yaml
#       interval: 86400
#   rules:
#     - RULE-SET,return-china,🇨🇳回国        # 放在 GEOSITE,cn / GEOIP,CN 之前
#
# ⚠️ 说明：
#   - 本规则集只包含"明确的国内服务域名"，不含 GEOSITE/GEOIP（rule-set 不支持）。
#     通用兜底请在主配置 rules 末尾自行追加 GEOSITE,cn,🇨🇳回国 与 GEOIP,CN,🇨🇳回国。
#   - 国服游戏域名分散且多变，建议在主配置额外加 GEOSITE,category-games-cn,🇨🇳回国。
#   - DRM / 客户端检测 / 账号绑定类限制无法靠分流绕过，规则集仅解决 IP 地理封锁。
# =============================================================================

